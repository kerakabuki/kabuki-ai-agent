name = "kabuki-post-365"
main = "src/index.ts"
compatibility_date = "2026-02-11"

assets = { directory = "frontend/dist", not_found_handling = "single-page-application" }

[[d1_databases]]
binding = "DB"
database_name = "kabuki-post-365-db"
database_id = "998c84a4-41c9-491e-9b70-b4c3a7906e18"
migrations_dir = "migrations"

[[r2_buckets]]
binding = "R2"
bucket_name = "kabuki-post-365-images"

[[kv_namespaces]]
binding = "KV"
id = "9983894f85534eb598c5d56f0224d9ef"

# 15分刻みで発火し、日替わりのランダムスロット（JST 6:00〜11:45）だけ実投稿する
# 21:00-23:45 UTC = 6:00-8:45 JST / 0:00-2:45 UTC = 9:00-11:45 JST
[triggers]
crons = ["*/15 21-23 * * *", "*/15 0-2 * * *"]

